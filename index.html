<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP Label Generator</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,sans-serif;background:#f0f0f0;min-height:100vh}
    nav{background:#111;color:#fff;padding:13px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
    .nav-logo{display:flex;align-items:center;gap:8px}
    .nav-brand{display:flex;flex-direction:column;line-height:1.2}
    .nav-brand span:first-child{font-size:11px;font-weight:700;letter-spacing:1px;color:#fff}
    .nav-brand span:last-child{font-size:9px;color:#aaa;letter-spacing:.5px}
    nav .sp{flex:1}
    .nav-btn{padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;letter-spacing:.5px}
    .btn-canva{background:#7d2ae8;color:#fff}.btn-canva:hover{background:#6a1fd0}
    .btn-print{background:#1a6fd4;color:#fff}.btn-print:hover{background:#155ab0}
    .app{display:grid;grid-template-columns:320px 1fr;min-height:calc(100vh - 48px)}
    @media(max-width:780px){.app{grid-template-columns:1fr}}
    .sidebar{background:#fff;border-right:1px solid #e0e0e0;padding:18px;overflow-y:auto;max-height:calc(100vh - 48px)}
    .sh{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#999;margin:0 0 10px}
    .field{margin-bottom:8px}
    .field label{display:block;font-size:11px;color:#555;font-weight:600;margin-bottom:3px}
    .field input{width:100%;padding:7px 9px;border:1px solid #ddd;border-radius:5px;font-size:13px;color:#111;font-family:Arial}
    .field input:focus{border-color:#555;outline:none}
    .r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .btn{width:100%;padding:9px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:none;margin-top:5px;letter-spacing:.3px}
    .b-add{background:#111;color:#fff}.b-add:hover{background:#333}
    .b-sec{background:transparent;color:#555;border:1px solid #ccc}.b-sec:hover{background:#f5f5f5}
    .b-del{background:transparent;color:#b00;border:1px solid #f0c0c0;font-size:12px;padding:7px}.b-del:hover{background:#fff5f5}
    .div{border:none;border-top:1px solid #eee;margin:14px 0}
    .parse-box{background:#f0f7ff;border:1px solid #c0d8f5;border-radius:8px;padding:12px;margin-bottom:12px}
    .parse-box .plabel{display:block;font-size:11px;font-weight:700;color:#1a6fd4;margin-bottom:5px;letter-spacing:.5px}
    .parse-row{display:flex;gap:6px}
    .parse-row input{flex:1;padding:7px 9px;border:1px solid #c0d8f5;border-radius:5px;font-size:13px;color:#111;font-family:Arial;background:#fff}
    .parse-row input:focus{border-color:#1a6fd4;outline:none}
    .parse-btn{padding:7px 12px;border-radius:5px;border:none;background:#1a6fd4;color:#fff;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap}
    .parse-btn:hover{background:#155ab0}
    .parse-status{font-size:10px;margin-top:4px;min-height:14px}
    .sep{display:flex;align-items:center;gap:8px;margin:10px 0 8px}
    .sep-line{flex:1;border-top:1px dashed #e0e0e0}
    .sep span{font-size:10px;color:#bbb;white-space:nowrap}
    .img-upload{border:1.5px dashed #ddd;border-radius:7px;padding:10px;text-align:center;cursor:pointer;margin-bottom:8px}
    .img-upload:hover{border-color:#888}
    .img-upload input{display:none}
    .img-upload .img-preview{width:100%;max-height:80px;object-fit:contain;border-radius:4px;display:none}
    .img-upload .img-placeholder{font-size:11px;color:#aaa}
    .img-upload .img-placeholder span{display:block;font-size:20px;margin-bottom:2px}
    .img-clear{font-size:11px;color:#b00;background:none;border:none;cursor:pointer;margin-top:4px;display:none}
    .csv-box{background:#f8f8f8;border:1px dashed #ccc;border-radius:7px;padding:12px;margin-bottom:10px}
    .csv-box p{font-size:11px;color:#888;margin-bottom:6px;line-height:1.5}
    .csv-box textarea{width:100%;height:72px;font-size:11px;font-family:monospace;border:1px solid #ddd;border-radius:4px;padding:5px;color:#333;resize:vertical}
    .olist{margin-top:10px}
    .oitem{background:#f9f9f9;border:1px solid #e5e5e5;border-radius:7px;padding:8px 10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
    .oitem:hover{border-color:#1a6fd4;background:#f0f6ff}
    .oname{font-weight:700;font-size:12px}
    .ometa{font-size:10px;color:#999;margin-top:1px}
    .odel{background:none;border:none;color:#ccc;cursor:pointer;font-size:15px;padding:2px 5px;border-radius:3px}
    .odel:hover{color:#b00;background:#fff0f0}
    .main{padding:20px;overflow-y:auto;max-height:calc(100vh - 48px)}
    .mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
    .mhead h1{font-size:17px;font-weight:700}
    .lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(470px,1fr));gap:18px}
    @media(max-width:560px){.lgrid{grid-template-columns:1fr}}
    .lcard{background:#fff;border-radius:9px;border:1px solid #ddd;overflow:hidden}
    .lchead{padding:8px 12px;background:#f7f7f7;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center}
    .lchead span{font-size:11px;font-weight:700;color:#666}
    .lchead-btns{display:flex;gap:6px}
    .lcbtn{font-size:11px;padding:3px 9px;border-radius:4px;cursor:pointer;background:transparent;border:1px solid #ddd;color:#555}
    .lcbtn:hover{background:#eee}
    .lcbtn-canva{border-color:#7d2ae8;color:#7d2ae8}.lcbtn-canva:hover{background:#f5eeff}
    .empty{text-align:center;padding:50px 20px;color:#bbb}
    .empty h2{font-size:18px;margin-bottom:6px;color:#ccc}
    .empty p{font-size:13px;line-height:1.6}
    .notice{background:#fff8e1;border:1px solid #ffe082;border-radius:7px;padding:12px 14px;margin-bottom:14px;font-size:12px;color:#795548;line-height:1.6}
    .label{width:470px;height:278px;background:#fff;position:relative;overflow:hidden;font-family:Arial,sans-serif;margin:0 auto}
    .btr{position:absolute;top:-8px;right:-8px;width:165px;height:112px;background:radial-gradient(ellipse 72px 52px at 57% 27%,rgba(90,180,205,.38) 0%,transparent 67%),radial-gradient(ellipse 52px 36px at 80% 66%,rgba(70,160,190,.22) 0%,transparent 56%),radial-gradient(ellipse 26px 20px at 36% 76%,rgba(185,150,70,.26) 0%,transparent 56%);border-radius:0 8px 0 52%}
    .bbl{position:absolute;bottom:-8px;left:-8px;width:150px;height:105px;background:radial-gradient(ellipse 72px 50px at 32% 66%,rgba(90,180,205,.32) 0%,transparent 60%),radial-gradient(ellipse 46px 32px at 66% 27%,rgba(70,160,190,.18) 0%,transparent 50%),radial-gradient(ellipse 30px 22px at 17% 27%,rgba(185,150,70,.2) 0%,transparent 50%);border-radius:52% 0 8px 8px}
    .li{position:relative;z-index:2;padding:11px 15px 7px;height:100%;display:flex;flex-direction:column}
  </style></title>
  </head>
